<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

    function ChatInput() {
      return (
        <>
          <input 
            placeholder="Send a message to Chatbot" 
            size="30"
          />
          <button>Send</button>
        </>
      );
    }

    function ChatMessage({ message, sender }) {

      /* if (sender === 'chatbot') {
        return (
          <div>
            <img src="../images/robot.png" alt="User" width="50"/>
            {message}
          </div>
        );
      } */
      return (
        <div>
          {sender === 'chatbot' && (
            <img src="../images/robot.png" alt="Robot" width="50" />
          )}
          {message}
          {sender === 'user' && (
            <img src="../images/user.png" alt="User" width="50" />
          )}
        </div>
      );
    }

    function ChatMessages() {
      const [chatMessages, setChatMessages] = React.useState([
        {
          message: 'hello chatbot', 
          sender: 'user',
          id: 'id1' 
        },
        {
          message: 'Hello! How can i help you?', 
          sender: 'chatbot',
          id: 'id2' 
        },
        {
          message: "can you get me today's date?", 
          sender: 'user',
          id: 'id3' 
        },
        {
          message: "Sure! Today's date is 2026-06-09.", 
          sender: 'chatbot',
          id: 'id4'
        }
      ]);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages =array[0]; // chatMessages
      // const setChatMessages = array[1]; // setChatMessages

      const chatMessageComponents = chatMessages.map((chatMessage) => {
        return (
          <ChatMessage 
            message={chatMessage.message} 
            sender={chatMessage.sender} 
            key={chatMessage.id}
          />
        );
      });

      function sendMessage() {
        setChatMessages([
          ...chatMessages,
          {
            message: "test",
            sender: "user",
            id: crypto.randomUUID()
          }
        ]);
      }

      return (
        <>   
          <button onClick={sendMessage}>Send message</button>

          {chatMessageComponents}
        </>
      )
    }

      
    function App() {
      return (
        <>
          <ChatInput />
          <ChatMessages />
        </>
      )
    }
        

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
