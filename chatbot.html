<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-width: 1px solid #ccc;
        border-radius: 10px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

    function ChatInput({ chatMessages, setChatMessages }) {
      const [inputText, setInputText] = React.useState('');
      
      function saveInputText(event) {
        setInputText(event.target.value);
      }

      function sendMessage() {
        const newChatMessages = [
          ...chatMessages,
          {
            message: inputText,
            sender: "user",
            id: crypto.randomUUID()
          }
        ];

        setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "chatbot",
              id: crypto.randomUUID()
            }
          ]);

        setInputText('');
      }
      return (
        <div className="chat-input-container">
          <input 
            placeholder="Send a message to Chatbot" 
            size="30"
            onChange={saveInputText}
            value={inputText}
            className="chat-input"
          />
          <button 
            onClick={sendMessage}
            className = "send-button"
            >Send</button>
        </div>
      );
    }

    function ChatMessage({ message, sender }) {

      /* if (sender === 'chatbot') {
        return (
          <div>
            <img src="../images/robot.png" alt="User" width="50"/>
            {message}
          </div>
        );
      } */
      return (
        <div>
          {sender === 'chatbot' && (
            <img src="../images/robot.png" alt="Robot" width="50" />
          )}
          {message}
          {sender === 'user' && (
            <img src="../images/user.png" alt="User" width="50" />
          )}
        </div>
      );
    }

    function ChatMessages({ chatMessages }) {
      
      const chatMessageComponents = chatMessages.map((chatMessage) => {
        return (
          <ChatMessage 
            message={chatMessage.message} 
            sender={chatMessage.sender} 
            key={chatMessage.id}
          />
        );
      });


      return (
        <>   
          {chatMessageComponents}
        </>
      )
    }

      
    function App() {
      const [chatMessages, setChatMessages] = React.useState([
        {
          message: 'hello chatbot', 
          sender: 'user',
          id: 'id1' 
        },
        {
          message: 'Hello! How can i help you?', 
          sender: 'chatbot',
          id: 'id2' 
        },
        {
          message: "can you get me today's date?", 
          sender: 'user',
          id: 'id3' 
        },
        {
          message: "Sure! Today's date is 2026-06-09.", 
          sender: 'chatbot',
          id: 'id4'
        }
      ]);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages =array[0]; // chatMessages
      // const setChatMessages = array[1]; // setChatMessages

      return (
        <div className="app-container">
          <ChatInput 
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}  
          />
          <ChatMessages
            chatMessages={chatMessages} 
          />
        </div>
      )
    }
        

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
